<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Outer circle - orange -->
  <circle cx="100" cy="100" r="95" fill="#D4700A"/>
  <!-- White ring -->
  <circle cx="100" cy="100" r="88" fill="none" stroke="#fff" stroke-width="3"/>
  <!-- Inner circle - white -->
  <circle cx="100" cy="100" r="72" fill="#fff"/>

  <!-- Curved text top: FACULTAD DE CIENCIAS ADMINISTRATIVAS -->
  <defs>
    <path id="topArc" d="M 100,100 m -78,0 a 78,78 0 1,1 156,0" fill="none"/>
  </defs>
  <text font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#D4700A" letter-spacing="1.5">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">FACULTAD DE CIENCIAS ADMINISTRATIVAS</textPath>
  </text>

  <!-- Building -->
  <rect x="68" y="62" width="36" height="44" fill="#333" rx="1"/>
  <rect x="72" y="66" width="8" height="8" fill="#fff" rx="0.5"/>
  <rect x="84" y="66" width="8" height="8" fill="#fff" rx="0.5"/>
  <rect x="72" y="78" width="8" height="8" fill="#fff" rx="0.5"/>
  <rect x="84" y="78" width="8" height="8" fill="#fff" rx="0.5"/>
  <rect x="72" y="90" width="8" height="8" fill="#fff" rx="0.5"/>
  <rect x="84" y="90" width="8" height="8" fill="#fff" rx="0.5"/>
  <!-- Roof -->
  <polygon points="64,62 86,48 108,62" fill="#E8850E"/>

  <!-- Briefcase -->
  <rect x="96" y="78" width="30" height="22" fill="#333" rx="2"/>
  <rect x="105" y="74" width="12" height="6" fill="none" stroke="#333" stroke-width="2" rx="1"/>
  <line x1="96" y1="88" x2="126" y2="88" stroke="#D4700A" stroke-width="2"/>

  <!-- PRÁCTICAS text -->
  <text x="100" y="125" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#E8850E" text-anchor="middle" letter-spacing="0.5">PRÁCTICAS</text>
  <!-- LABORALES text -->
  <text x="100" y="139" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#333" text-anchor="middle" letter-spacing="1">LABORALES</text>

  <!-- FCADM badge at bottom -->
  <ellipse cx="100" cy="160" rx="24" ry="10" fill="#D4700A"/>
  <text x="100" y="164" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#fff" text-anchor="middle">FCADM</text>
</svg>
